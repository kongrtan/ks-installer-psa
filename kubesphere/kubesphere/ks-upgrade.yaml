---
apiVersion: batch/v1
kind: Job
metadata:
  name: ks-upgrade
  namespace: kubesphere-system
  labels:
    job: ks-upgrade
    version: v3.0.0
spec:
  template:
    spec:
      serviceAccountName: ks-installer
      restartPolicy: OnFailure
      containers:
        - command:
            - ks-upgrade
            - --logtostderr
            - --v=4
          image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/kubesphere/ks-upgrade:v3.3.2
          imagePullPolicy: IfNotPresent
          name: ks-upgrade