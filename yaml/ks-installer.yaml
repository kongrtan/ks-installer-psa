---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: ks-installer
subjects:
- kind: ServiceAccount
  name: ks-installer
  namespace: kubesphere-system
roleRef:
  kind: ClusterRole
  name: ks-installer
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ks-installer
  namespace: kubesphere-system
  labels:
    app: ks-installer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ks-installer
  template:
    metadata:
      labels:
        app: ks-installer
    spec:
      serviceAccountName: ks-installer
      # 파드 수준의 보안 설정
      securityContext:
        runAsNonRoot: true        # Root 사용자로 실행 금지
        runAsUser: 1002           # 특정 일반 사용자 ID 지정
        fsGroup: 2000             # 볼륨 권한 그룹 지정
        seccompProfile:           # 시스템 호출 제한 설정
          type: RuntimeDefault
      containers:
      - name: installer
        image: kongrtan/ks-installer-psa:0.1
        imagePullPolicy: "Always"
        env:
        - name: ANSIBLE_STDOUT_CALLBACK
          value: "debug"  # Ansible 실행 시 상세한 결과(task별 상세 정보)를 출력합니다.
        # 인스톨러 자체 로그 수준을 높이고 싶을 때 (이미지 사양에 따라 다를 수 있음)
        - name: LOG_LEVEL
          value: "debug"  
        # 컨테이너 수준의 보안 설정
        securityContext:
          allowPrivilegeEscalation: false  # 권한 상승 금지
          capabilities:
            drop: ["ALL"]                  # 모든 리눅스 커널 권한 제거
          readOnlyRootFilesystem: false    # 인스톨러는 임시 파일 생성이 필요하므로 false 유지
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 20m
            memory: 100Mi
